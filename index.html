<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サークルLP</title>

  <!-- ===== ここからCSS（見た目の設定） ===== -->
  <style>
    /* 全体の初期設定 */
    * {
      box-sizing: border-box;     /* paddingを含めた幅で計算する */
      margin: 0;
      padding: 0;
    }
    body {
      font-family: sans-serif;    /* ゴシック体（すっきりしたフォント） */
      color: #1a1523;
      background: #ffffff;
    }
    html {
      scroll-behavior: smooth;    /* ボタンを押したときなめらかに移動 */
    }
    a {
      text-decoration: none;      /* リンクの下線を消す */
    }

    /* ===== ヘッダー ===== */
    .header {
      position: sticky;           /* スクロールしても上に固定 */
      top: 0;
      z-index: 10;
      background: #6D28D9;         /* 紫色 */
      display: flex;              /* 中身を横並びにする */
      align-items: center;
      justify-content: space-between; /* 左右の端に寄せる */
      gap: 24px;
      padding: 0 32px;
      height: 72px;
    }
    /* サークル名の入力欄 */
    .header input {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      color: #ffffff;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 16px;
      width: 240px;
      outline: none;
    }
    .header input::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }
    /* 右側のナビ（ボタンの集まり） */
    .nav {
      display: flex;
      gap: 8px;
    }
    .nav a {
      color: #ffffff;
      font-size: 15px;
      padding: 9px 18px;
      border-radius: 8px;
    }
    .nav a:hover {
      background: rgba(255, 255, 255, 0.15);  /* マウスを乗せると薄く光る */
    }
    /* 「お問い合わせ」だけ白いボタンにする */
    .nav a.btn-contact {
      background: #ffffff;
      color: #6D28D9;
      font-weight: bold;
    }
    .nav a.btn-contact:hover {
      background: #f0e9ff;
    }

    /* ===== ヒーロー（一番上の大きな見出しエリア） ===== */
    .hero {
      max-width: 1080px;
      margin: 0 auto;            /* 中央寄せ */
      padding: 72px 32px;
      display: grid;             /* 左右2列に分ける */
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }
    .hero .label {
      color: #6D28D9;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 44px;
      line-height: 1.3;
      margin-bottom: 20px;
    }
    .hero p.lead {
      font-size: 16px;
      line-height: 1.9;
      color: #52525b;
      margin-bottom: 32px;
    }
    /* ヒーローのボタン */
    .hero .cta {
      display: inline-block;
      background: #6D28D9;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      padding: 14px 32px;
      border-radius: 10px;
    }
    .hero .cta:hover {
      background: #5b21b6;
    }
    /* 写真を入れる枠（仮の画像） */
    .hero img {
      width: 100%;
      height: 340px;
      object-fit: cover;         /* 枠に合わせて画像を切り抜く */
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(109, 40, 217, 0.15);
    }

    /* ===== 特徴セクション（縦に4つ積むボックス） ===== */
    .features {
      background: #faf8ff;
      border-top: 1px solid #efeaf9;
      border-bottom: 1px solid #efeaf9;
      padding: 56px 32px;
    }
    .features .inner {
      max-width: 760px;
      margin: 0 auto;
    }
    .features h2 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 8px;
    }
    .features .sub {
      text-align: center;
      font-size: 15px;
      color: #71717a;
      margin-bottom: 40px;
    }
    /* ボックスを縦に並べる箱 */
    .box-list {
      display: flex;
      flex-direction: column;    /* 縦並び */
      gap: 20px;
    }
    /* ひとつひとつのボックス */
    .box {
      background: #ffffff;
      border: 1px solid #ece7f6;
      border-radius: 14px;
      padding: 28px 32px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    /* ボックス左の番号 */
    .box .num {
      flex: none;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #6D28D9;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
    .box h3 {
      font-size: 19px;
      margin-bottom: 8px;
    }
    .box p {
      font-size: 15px;
      line-height: 1.8;
      color: #52525b;
    }

    /* ===== 紹介セクション ===== */
    .about {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 32px;
      text-align: center;
    }
    .about h2 {
      font-size: 26px;
      margin-bottom: 16px;
    }
    .about p {
      font-size: 15px;
      line-height: 1.9;
      color: #52525b;
    }

    /* ===== フッター（一番下） ===== */
    .footer {
      background: #1a1523;
      color: #ffffff;
      padding: 48px 32px;
    }
    .footer .inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .footer .name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .footer .desc {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.6);
    }
    .footer .links {
      display: flex;
      gap: 40px;
    }
    .footer .col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .footer .col .title {
      font-size: 13px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.5);
    }
    .footer .col a {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }
    .footer .copyright {
      max-width: 760px;
      margin: 32px auto 0;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
  <!-- ===== ここまでCSS ===== -->
</head>

<body>

  <!-- ===== ヘッダー：左に名前欄、右にボタン3つ ===== -->
  <header class="header">
    <!-- placeholder の文字を変えれば初期表示が変わります -->
    <input type="text" placeholder="石原太郎 自己紹介サイト">
    <nav class="nav">
      <!-- href="#id名" で、そのidを持つ場所までジャンプします -->
      <a href="#features">コンテンツ</a>
      <a href="#about">特徴</a>
      <a href="#contact" class="btn-contact">お問い合わせ</a>
    </nav>
  </header>

  <!-- ===== ヒーロー：タイトル＋写真 ===== -->
  <section class="hero" id="hero">
    <div>
      <p class="label">ここにテキストが入ります</p>
      <h1>石原太郎の自己紹介</h1>
      <p class="lead">拝啓この手紙</p>
      <a href="#contact" class="cta">読んで読む手紙</a>
    </div>
    <!-- ↓ src="" の中身を自分の写真ファイル名に変えれば差し替えできます（例 src="photo.jpg"） -->
    <img src="uploads/asahiyama.jpg" alt="仮の画像">
  </section>

  <!-- ===== 特徴：縦に4つ積むボックス ===== -->
  <section class="features" id="features">
    <div class="inner">
      <h2>好きなアニメランキング</h2>
      <p class="sub">ここにテキストが入ります</p>

      <div class="box-list">
        <!-- ボックス1 -->
        <div class="box">
          <div class="num">1</div>
          <div>
            <h3>甲鉄城のカバネリ</h3>
            <p>コロナ禍の５月の青春</p>
          </div>
        </div>
        <!-- ボックス2 -->
        <div class="box">
          <div class="num">2</div>
          <div>
            <h3>進撃の巨人</h3>
            <p>不朽の名作。</p>
          </div>
        </div>
        <!-- ボックス3 -->
        <div class="box">
          <div class="num">3</div>
          <div>
            <h3>銀魂</h3>
            <p>面白い。下品。だがそれがイイ</p>
          </div>
        </div>
        <!-- ボックス4 -->
        <div class="box">
          <div class="num">4</div>
          <div>
            <h3>ジョジョ</h3>
            <p>このアニメには凄みがあるッ！</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 紹介セクション ===== -->
  <section class="about" id="about">
    <h2>学生時代に頑張ったこと</h2>
    <p>昨年、一昨年とボランティア活動</p>
  </section>

  <!-- ===== フッター ===== -->
  <footer class="footer" id="contact">
    <div class="inner">
      <div>
        <p class="name">拝啓この手紙</p>
        <p class="desc">ピアノがでかすぎる、、、</p>
      </div>
      <div class="links">
        <div class="col">
          <p class="title">読んで読む手紙</p>
          <a href="#about">顔でも弾いてる、、？</a>
          <a href="#features"></a>
        </div>
        <div class="col">
          <p class="title">どこで何をしている手紙</p>
          <a href="#contact">手紙も書きすぎてるなぁ、、</a>
        </div>
      </div>
    </div>
    <p class="copyright">アキさーん！</p>
  </footer>

</body>
</html>
